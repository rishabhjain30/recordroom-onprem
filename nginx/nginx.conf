server {
    listen 80;
    server_name _;

    # Increase max body size for file uploads
    client_max_body_size 50M;

    # GoTrue auth endpoints
    # supabase-js calls /auth/v1/signup, /auth/v1/token, etc.
    # GoTrue serves at root: /signup, /token, etc.
    # Trailing slash on both location and proxy_pass strips /auth/v1 prefix
    location /auth/v1/ {
        proxy_pass http://gotrue:9999/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support for streaming responses
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Backend health check (direct)
    location /health {
        proxy_pass http://backend:8001/health;
    }

    # Frontend (catch-all)
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Next.js HMR (dev only, harmless in prod)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
